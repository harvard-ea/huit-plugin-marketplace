# Data-repo CI gate. Drop this into the MARKETPLACE DATA REPO
# (harvard-huit/huit-plugin-marketplace, or the harvard-ea POC copy) at
#   .github/workflows/validate.yml
# Generated/maintained in harvard-ea/plugin-marketplace-manager.
#
# It runs the generation library's `check` on every PR: validates each
# server.yaml input, validates the generated Claude/Codex catalogs against their
# plugin-entry schemas, and asserts the committed generated files are current.
# This is the gate that would have caught the `url`-in-catalog bug before merge.
#
# The generator is the TypeScript library in the manager repo's worker/ package
# (the same code the Cloudflare Worker runs when it opens submission PRs), run
# directly under Node's native type stripping — no build step.
#
# Pair with branch protection on `main` (see data-repo-ci/README.md) so this
# check is required before a (bot or human) PR can merge.
name: validate-marketplace

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Clone the generator straight from the manager repo.
      #
      # The manager repo is PRIVATE, so the default Actions token can't read
      # it. Supply a read-only token as the GEN_INSTALL_TOKEN repo secret
      # (fine-grained PAT, resource owner harvard-ea, with Contents:read on
      # harvard-ea/plugin-marketplace-manager). Passed via env so it's masked.
      #
      # Pin the checkout to a manager-repo SHA (replace `main`) so catalog
      # generation can't drift under CI; bump deliberately on generator changes.
      - name: Install generator
        env:
          GEN_TOKEN: ${{ secrets.GEN_INSTALL_TOKEN }}
        run: |
          git clone --depth 1 --branch main \
            "https://x-access-token:${GEN_TOKEN}@github.com/harvard-ea/plugin-marketplace-manager.git" \
            "$RUNNER_TEMP/manager"
          npm --prefix "$RUNNER_TEMP/manager/worker" install --omit=dev --ignore-scripts --no-audit --no-fund

      # $GITHUB_REPOSITORY (= owner/repo) makes the freshness check use this
      # repo's own identity for the Pages install command — matching what the
      # submission server generated when it opened the PR.
      - name: Validate inputs, catalogs, and generated-file freshness
        run: node "$RUNNER_TEMP/manager/worker/src/gen/cli.ts" check . --marketplace-repo "$GITHUB_REPOSITORY"
